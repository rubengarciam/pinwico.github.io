---
layout: default
body_class: post-page
---
{% include header.html %}
<main class="post">
  <article>
    <header class="post-header">
      <h1>{{ page.title }}</h1>
      {% if page.description %}<p class="post-description">{{ page.description }}</p>{% endif %}
    </header>
    {% if page.archived %}<div class="project-archived">This project is no longer maintained.</div>{% endif %}
    {% include toc.html %}
    <div class="post-content">
      {{ content }}
    </div>
  </article>
</main>
