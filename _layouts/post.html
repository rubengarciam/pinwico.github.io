---
layout: default
body_class: post-page
---
{% include header.html %}
<main class="post">
  <article>
    <header class="post-header">
      <h1>{{ page.title }}</h1>
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
    </header>
    {% include toc.html %}
    <div class="post-content">
      {{ content }}
    </div>
  </article>
</main>
